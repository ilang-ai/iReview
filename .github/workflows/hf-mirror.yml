name: Mirror to HuggingFace

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p /tmp/hf-push
          cp README.md LICENSE CLAUDE.md GEMINI.md AGENTS.md /tmp/hf-push/
          cp -r skills /tmp/hf-push/
          cp -r commands /tmp/hf-push/
          cd /tmp/hf-push
          git init -b main
          git config user.name "ilang-ai"
          git config user.email "ilang-ai@users.noreply.github.com"
          git add -A
          git commit -m "Sync from GitHub"
          git remote add hf https://ilangai:${HF_TOKEN}@huggingface.co/datasets/i-Lang/iReview
          git push hf main --force
